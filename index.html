<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>vieah ff</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;
      background: linear-gradient(180deg, #0f172a, #020617);
    }

    .container {
      padding: 20px;
    }

    /* Avatar */
    .avatar {
      width: 120px;
      height: 120px;
      margin: 30px auto;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid #00ffcc;
      box-shadow: 0 0 20px #00ffcc;
      animation: glow 2s infinite alternate;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @keyframes glow {
      from { box-shadow: 0 0 10px #00ffcc; }
      to { box-shadow: 0 0 30px #00ffcc; }
    }

    h1 {
      margin: 10px 0;
    }

    p {
      color: #aaa;
    }

    /* Button */
    .btn {
      display: block;
      width: 85%;
      margin: 15px auto;
      padding: 15px;
      border-radius: 30px;
      border: 2px solid #00ffcc;
      color: #00ffcc;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
      box-shadow: 0 0 10px #00ffcc;
    }

    .btn:hover {
      background: #00ffcc;
      color: black;
      transform: scale(1.05);
      box-shadow: 0 0 25px #00ffcc;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- Ảnh đại diện -->
  <div class="avatar">
    <img src="IMG_20260330_163604.jpg">
  </div>

  <h1>vieah ff 🔥</h1>
  <p>Player Free Fire 🎮</p>

  <a class="btn" href="#">🎮 Chơi game</a>
  <a class="btn" href="#">🔥 TikTok của tôi</a>
  <a class="btn" href="#">💎 Liên hệ</a>

</div>

</body>
</html>
